<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Calm developmental scene with toy blocks and gentle upward growth cues</title>
<desc>A warm, observational illustration showing toy blocks of varying heights arranged like a gentle growth chart, resting on a soft wooden surface. Pastel-colored blocks in rounded forms suggest progress without competition or clinical pressure.</desc>
