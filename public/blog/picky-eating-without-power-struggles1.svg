  <!-- Mac pile -->
  <ellipse cx="218" cy="348" rx="90" ry="27" fill="#F0C060" opacity="0.9"/>
  <!-- Individual mac pieces (elbow shapes) -->
  <path d="M 148 342 Q 155 335 165 340 Q 168 350 160 354 Q 150 350 148 342Z" fill="#F8C868"/>
  <path d="M 165 335 Q 172 328 182 333 Q 185 343 177 347 Q 167 343 165 335Z" fill="#EEB858"/>
  <path d="M 182 332 Q 190 325 200 330 Q 203 340 195 344 Q 185 340 182 332Z" fill="#F8C868"/>
  <path d="M 200 330 Q 208 323 218 328 Q 221 338 213 342 Q 203 338 200 330Z" fill="#EEB858"/>
  <path d="M 218 330 Q 226 323 236 328 Q 239 338 231 342 Q 221 338 218 330Z" fill="#F8C868"/>
  <path d="M 236 332 Q 244 325 254 330 Q 257 340 249 344 Q 239 340 236 332Z" fill="#EEB858"/>
  <path d="M 254 335 Q 262 328 272 333 Q 275 343 267 347 Q 257 343 254 335Z" fill="#F8C868"/>
  <path d="M 160 348 Q 167 342 177 347 Q 180 356 172 360 Q 162 356 160 348Z" fill="#E8B050"/>
  <path d="M 177 345 Q 185 338 195 343 Q 198 353 190 357 Q 180 353 177 345Z" fill="#F8C868"/>
  <path d="M 196 344 Q 204 337 214 342 Q 217 352 209 356 Q 199 352 196 344Z" fill="#E8B050"/>
  <path d="M 214 344 Q 222 337 232 342 Q 235 352 227 356 Q 217 352 214 344Z" fill="#F8C868"/>
  <path d="M 232 345 Q 240 338 250 343 Q 253 353 245 357 Q 235 353 232 345Z" fill="#E8B050"/>
  <path d="M 250 348 Q 258 342 268 347 Q 271 356 263 360 Q 253 356 250 348Z" fill="#F8C868"/>
  <!-- Cheese sauce on top -->
  <ellipse cx="218" cy="340" rx="55" ry="16" fill="#F8D070" opacity="0.45"/>
  <ellipse cx="205" cy="336" rx="18" ry="8" fill="#FDE890" opacity="0.35"/>

  <!-- Fork beside plate 1 -->
  <g opacity="0.7" filter="url(#itemShadow)">
    <rect x="60" y="308" width="7" height="100" rx="3.5" fill="#C0B8B0"/>
    <rect x="57" y="294" width="3.5" height="24" rx="1.5" fill="#C0B8B0"/>
    <rect x="62" y="294" width="3.5" height="24" rx="1.5" fill="#C0B8B0"/>
    <rect x="67" y="294" width="3.5" height="24" rx="1.5" fill="#C0B8B0"/>
    <rect x="72" y="294" width="3.5" fill="#C0B8B0" height="24" rx="1.5"/>
  </g>

  <!-- Plate 1 label dot — calm green = safe/comfortable -->
  <circle cx="218" cy="398" r="10" fill="#7AB868" opacity="0.55"/>
  <circle cx="218" cy="398" r="6" fill="#8ACC78" opacity="0.7"/>


