<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="nightBg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" style="stop-color:#2A3245;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#151C2E;stop-opacity:1"/>
    </radialGradient>
    <radialGradient id="lampGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F5D98A;stop-opacity:0.95"/>
      <stop offset="40%" style="stop-color:#E8B84A;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#E8B84A;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="lampGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F5D98A;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#F5D98A;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="cribWood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B8956A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8A6840;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="mattressGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E0D4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D8D0C4;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="blanketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8D8E8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A8C0D8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2E2418;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#201A10;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lampBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A858;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B88838;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lampShade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0D488;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D8B460;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000040"/>
    </filter>
    <filter id="shadowSoft">
      <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#00000025"/>
    </filter>
    <clipPath id="cribClip">
      <rect x="330" y="200" width="540" height="300"/>
    </clipPath>
  </defs>

  <!-- Night sky background -->
  <rect width="1200" height="630" fill="url(#nightBg)"/>

  <!-- Subtle stars -->
  <circle cx="80" cy="50" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="160" cy="30" r="1" fill="white" opacity="0.25"/>
  <circle cx="240" cy="70" r="1.5" fill="white" opacity="0.2"/>
  <circle cx="1050" cy="40" r="1.5" fill="white" opacity="0.28"/>
  <circle cx="1130" cy="80" r="1" fill="white" opacity="0.22"/>
  <circle cx="980" cy="25" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="60" cy="120" r="1" fill="white" opacity="0.15"/>
  <circle cx="1160" cy="130" r="1" fill="white" opacity="0.18"/>

  <!-- Moon crescent -->
  <circle cx="1090" cy="90" r="38" fill="#2A3245"/>
  <circle cx="1106" cy="78" r="32" fill="#3A4560" opacity="0.6"/>
  <circle cx="1072" cy="90" r="30" fill="url(#nightBg)"/>
  <circle cx="1090" cy="90" r="36" fill="#C8D4E8" opacity="0.12"/>

  <!-- Lamp glow pool on floor -->
  <ellipse cx="900" cy="490" rx="220" ry="80" fill="url(#lampGlow)" filter="url(#softBlur)" opacity="0.7"/>
  <!-- Extended ambient glow -->
  <ellipse cx="900" cy="400" rx="320" ry="260" fill="url(#lampGlow2)" opacity="0.8"/>

  <!-- Floor -->
  <rect y="490" width="1200" height="140" fill="url(#floorGrad)"/>
  <rect y="488" width="1200" height="5" fill="#3A2E1C" opacity="0.6"/>
  <!-- Floor floorboard lines -->
  <line x1="0" y1="520" x2="1200" y2="520" stroke="#251E12" stroke-width="1.5" opacity="0.4"/>
  <line x1="0" y1="555" x2="1200" y2="555" stroke="#251E12" stroke-width="1.5" opacity="0.4"/>
  <line x1="0" y1="590" x2="1200" y2="590" stroke="#251E12" stroke-width="1.5" opacity="0.35"/>
  <!-- Vertical board breaks -->
  <line x1="200" y1="490" x2="200" y2="630" stroke="#251E12" stroke-width="1" opacity="0.3"/>
  <line x1="480" y1="490" x2="480" y2="630" stroke="#251E12" stroke-width="1" opacity="0.3"/>
  <line x1="760" y1="490" x2="760" y2="630" stroke="#251E12" stroke-width="1" opacity="0.3"/>
  <line x1="1020" y1="490" x2="1020" y2="630" stroke="#251E12" stroke-width="1" opacity="0.3"/>

  <!-- Wall -->
  <rect y="0" width="1200" height="492" fill="transparent"/>
  <!-- Subtle wall texture / baseboard -->
  <rect y="470" width="1200" height="22" fill="#1E1810" opacity="0.5"/>

  <!-- CRIB -->
  <!-- Crib shadow on floor -->
  <ellipse cx="600" cy="498" rx="230" ry="18" fill="#00000040"/>
  <!-- Crib base/legs -->
  <rect x="360" y="455" width="22" height="45" rx="6" fill="#7A5838"/>
  <rect x="818" y="455" width="22" height="45" rx="6" fill="#7A5838"/>
  <!-- Crib bottom rail -->
  <rect x="345" y="445" width="510" height="20" rx="8" fill="url(#cribWood)" filter="url(#shadowSoft)"/>
  <!-- Crib mattress -->
  <rect x="355" y="295" width="490" height="154" rx="6" fill="url(#mattressGrad)"/>
  <!-- Mattress top -->
  <rect x="355" y="295" width="490" height="12" rx="6" fill="#F0E8DC"/>
  <!-- Fitted sheet hint -->
  <rect x="358" y="298" width="484" height="148" rx="4" fill="#EAE2D8" opacity="0.6"/>

  <!-- Crib front rail (lower, so we can see baby) -->
  <rect x="345" y="360" width="510" height="20" rx="8" fill="url(#cribWood)" filter="url(#shadowSoft)"/>
  <!-- Crib spindles front -->
  <rect x="373" y="380" width="12" height="68" rx="5" fill="#9A7850"/>
  <rect x="413" y="380" width="12" height="68" rx="5" fill="#9A7850"/>
  <rect x="453" y="380" width="12" height="68" rx="5" fill="#9A7850"/>
  <rect x="493" y="380" width="12" height="68" rx="5" fill="#9A7850"/>
  <rect x="533" y="380" width="12" height="68" rx="5" fill="#9A7850"/>
  <rect x="573" y="380" width="12" height="68" rx="5" fill="#9A7850"/>
  <rect x="613" y="380" width="12" height="68" rx="5" fill="#9A7850"/>
  <rect x="653" y="380" width="12" height="68" rx="5" fill="#9A7850"/>
  <rect x="693" y="380" width="12" height="68" rx="5" fill="#9A7850"/>
  <rect x="733" y="380" width="12" height="68" rx="5" fill="#9A7850"/>
  <rect x="773" y="380" width="12" height="68" rx="5" fill="#9A7850"/>
  <rect x="813" y="380" width="12" height="68" rx="5" fill="#9A7850"/>

  <!-- Crib back spindles (visible above baby) -->
  <rect x="373" y="215" width="10" height="85" rx="4" fill="#8A6840" opacity="0.7"/>
  <rect x="413" y="215" width="10" height="85" rx="4" fill="#8A6840" opacity="0.7"/>
  <rect x="453" y="215" width="10" height="85" rx="4" fill="#8A6840" opacity="0.7"/>
  <rect x="493" y="215" width="10" height="85" rx="4" fill="#8A6840" opacity="0.7"/>
  <rect x="533" y="215" width="10" height="85" rx="4" fill="#8A6840" opacity="0.7"/>
  <rect x="573" y="215" width="10" height="85" rx="4" fill="#8A6840" opacity="0.7"/>
  <rect x="613" y="215" width="10" height="85" rx="4" fill="#8A6840" opacity="0.7"/>
  <rect x="653" y="215" width="10" height="85" rx="4" fill="#8A6840" opacity="0.7"/>
  <rect x="693" y="215" width="10" height="85" rx="4" fill="#8A6840" opacity="0.7"/>
  <rect x="733" y="215" width="10" height="85" rx="4" fill="#8A6840" opacity="0.7"/>
  <rect x="773" y="215" width="10" height="85" rx="4" fill="#8A6840" opacity="0.7"/>
  <rect x="813" y="215" width="10" height="85" rx="4" fill="#8A6840" opacity="0.7"/>
  <!-- Top rail back -->
  <rect x="345" y="200" width="510" height="20" rx="8" fill="url(#cribWood)" filter="url(#shadow)"/>

  <!-- SLEEPING NEWBORN in crib -->
  <!-- Baby blanket/swaddle -->
  <ellipse cx="600" cy="368" rx="140" ry="52" fill="url(#blanketGrad)" opacity="0.95"/>
  <!-- Swaddle wrap fold -->
  <path d="M 480 355 Q 520 338 600 340 Q 680 338 720 355 Q 700 375 600 378 Q 500 375 480 355 Z" fill="#B8CCE0" opacity="0.5"/>
  <!-- Baby body swaddled -->
  <ellipse cx="600" cy="358" rx="80" ry="38" fill="#ECD8C8"/>
  <!-- Baby head -->
  <circle cx="600" cy="330" r="36" fill="#ECD8C8" filter="url(#shadowSoft)"/>
  <!-- Baby face - eyes closed, peaceful -->
  <!-- Eyes closed lines -->
  <path d="M 585 328 Q 590 332 596 328" stroke="#C4A080" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 604 328 Q 610 332 616 328" stroke="#C4A080" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Tiny nose -->
  <ellipse cx="600" cy="337" rx="4" ry="3" fill="#D4A888" opacity="0.5"/>
  <!-- Tiny mouth, relaxed -->
  <path d="M 595 344 Q 600 347 605 344" stroke="#C4A080" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Baby ear hint -->
  <ellipse cx="566" cy="334" rx="8" ry="10" fill="#E0C8B0"/>
  <ellipse cx="634" cy="334" rx="8" ry="10" fill="#E0C8B0"/>
  <!-- Baby hair, soft wisps -->
  <path d="M 580 308 Q 600 298 620 308" stroke="#8A6048" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Cheek blush -->
  <ellipse cx="583" cy="340" rx="8" ry="5" fill="#E8A890" opacity="0.3"/>
  <ellipse cx="617" cy="340" rx="8" ry="5" fill="#E8A890" opacity="0.3"/>

  <!-- Small soft toy / bunny next to baby -->
  <ellipse cx="700" cy="355" rx="22" ry="20" fill="#D8D0C8" opacity="0.7"/>
  <ellipse cx="692" cy="336" rx="9" ry="15" fill="#D8D0C8" opacity="0.7"/>
  <ellipse cx="709" cy="336" rx="9" ry="15" fill="#D8D0C8" opacity="0.7"/>
  <ellipse cx="700" cy="340" rx="14" ry="12" fill="#E0D8D0" opacity="0.7"/>

  <!-- NIGHT LAMP (right side) -->
  <!-- Lamp table -->
  <rect x="850" y="380" width="120" height="14" rx="5" fill="#6A5030" filter="url(#shadowSoft)"/>
  <rect x="850" y="394" width="120" height="100" rx="4" fill="#584028"/>
  <rect x="856" y="398" width="108" height="92" rx="3" fill="#604830" opacity="0.5"/>
  <!-- Table leg -->
  <rect x="900" y="492" width="20" height="20" rx="4" fill="#4A3018"/>
  <!-- Lamp base -->
  <rect x="892" y="338" width="36" height="46" rx="8" fill="url(#lampBase)"/>
  <rect x="897" y="342" width="26" height="38" rx="6" fill="#E0B868" opacity="0.4"/>
  <!-- Lamp shade -->
  <path d="M 870 292 L 880 342 L 950 342 L 960 292 Z" rx="6" fill="url(#lampShade)" filter="url(#shadowSoft)"/>
  <path d="M 870 292 Q 915 278 960 292" stroke="#D4A850" stroke-width="3" fill="none"/>
  <!-- Lamp glow source -->
  <ellipse cx="915" cy="340" rx="70" ry="20" fill="#F5D98A" opacity="0.9" filter="url(#softBlur)"/>
  <ellipse cx="915" cy="340" rx="50" ry="12" fill="#FDEAA0" opacity="0.8"/>
  <!-- Lamp cord -->
  <path d="M 910 384 Q 910 420 905 450" stroke="#3A2810" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Mobile above crib -->
  <line x1="600" y1="200" x2="600" y2="165" stroke="#9A8060" stroke-width="3"/>
  <line x1="520" y1="165" x2="680" y2="165" stroke="#9A8060" stroke-width="3"/>
  <!-- Mobile hangs -->
  <line x1="530" y1="165" x2="510" y2="195" stroke="#9A8060" stroke-width="2"/>
  <line x1="600" y1="165" x2="600" y2="195" stroke="#9A8060" stroke-width="2"/>
  <line x1="670" y1="165" x2="690" y2="195" stroke="#9A8060" stroke-width="2"/>
  <!-- Mobile stars/moons -->
  <circle cx="510" cy="202" r="10" fill="#C8D8E8" opacity="0.75"/>
  <circle cx="600" cy="202" r="8" fill="#D4C8E8" opacity="0.7"/>
  <!-- Small moon charm -->
  <path d="M 690 202 Q 703 196 700 210 Q 690 216 684 208 Q 688 204 690 202 Z" fill="#E8D898" opacity="0.75"/>

  <!-- Subtle room corner / wall panel -->
  <line x1="100" y1="0" x2="100" y2="492" stroke="#1E2840" stroke-width="2" opacity="0.4"/>
  <line x1="1100" y1="0" x2="1100" y2="492" stroke="#1E2840" stroke-width="2" opacity="0.4"/>

  <!-- Breathing glow overlay - warm pool from lamp -->
  <ellipse cx="870" cy="380" rx="280" ry="180" fill="#F5D98A" opacity="0.06"/>

  <!-- Soft vignette -->
  <radialGradient id="vig" cx="50%" cy="50%" r="65%">
    <stop offset="40%" style="stop-color:transparent"/>
    <stop offset="100%" style="stop-color:#0A0F1E;stop-opacity:0.55"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#vig)"/>
</svg>
