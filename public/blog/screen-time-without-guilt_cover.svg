<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7f4f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ede8e1;stop-opacity:1" />
    </linearGradient>
    <!-- Soft shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#c8bfb0" flood-opacity="0.25"/>
    </filter>
    <filter id="subtleShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#b0a898" flood-opacity="0.2"/>
    </filter>
    <!-- Warm glow for lamp -->
    <radialGradient id="lampGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fde9b5;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#fde9b5;stop-opacity:0"/>
    </radialGradient>
    <!-- Screen glow -->
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#dbeeff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#c2dcf5;stop-opacity:0.6"/>
    </radialGradient>
    <!-- Rug gradient -->
    <linearGradient id="rugGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8dfd4"/>
      <stop offset="100%" style="stop-color:#d9cfc3"/>
    </linearGradient>
    <!-- Sofa gradient -->
    <linearGradient id="sofaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c9d4dc"/>
      <stop offset="100%" style="stop-color:#b0bdc8"/>
    </linearGradient>
    <!-- Wall -->
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ece6"/>
      <stop offset="100%" style="stop-color:#e8e2da"/>
    </linearGradient>
    <!-- Plant pot -->
    <linearGradient id="potGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c87a5a"/>
      <stop offset="100%" style="stop-color:#a85e40"/>
    </linearGradient>
  </defs>

  <!-- Background wall -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Floor -->
  <rect x="0" y="460" width="1200" height="170" fill="#e2dbd2"/>

  <!-- Baseboard -->
  <rect x="0" y="458" width="1200" height="8" fill="#d5cec5"/>

  <!-- Rug -->
  <ellipse cx="580" cy="510" rx="380" ry="60" fill="url(#rugGrad)" opacity="0.85"/>
  <!-- Rug border detail -->
  <ellipse cx="580" cy="510" rx="380" ry="60" fill="none" stroke="#c4b9ab" stroke-width="4" opacity="0.5"/>
  <ellipse cx="580" cy="510" rx="360" ry="52" fill="none" stroke="#c4b9ab" stroke-width="2" opacity="0.3"/>

  <!-- Lamp glow on wall (background ambiance) -->
  <ellipse cx="960" cy="280" rx="180" ry="200" fill="url(#lampGlow)"/>

  <!-- Bookshelf on left wall -->
  <rect x="40" y="200" width="140" height="260" rx="4" fill="#d6cfc5" filter="url(#subtleShadow)"/>
  <rect x="40" y="200" width="140" height="8" rx="2" fill="#c8bfb3"/>
  <!-- Shelves -->
  <rect x="44" y="270" width="132" height="6" rx="2" fill="#c0b8ae"/>
  <rect x="44" y="340" width="132" height="6" rx="2" fill="#c0b8ae"/>
  <rect x="44" y="410" width="132" height="6" rx="2" fill="#c0b8ae"/>
  <!-- Books row 1 -->
  <rect x="50" y="215" width="18" height="52" rx="2" fill="#7a9db5"/>
  <rect x="70" y="220" width="14" height="47" rx="2" fill="#a8c4b0"/>
  <rect x="86" y="218" width="20" height="49" rx="2" fill="#c4927a"/>
  <rect x="108" y="222" width="16" height="45" rx="2" fill="#9ab0c8"/>
  <rect x="126" y="215" width="22" height="52" rx="2" fill="#b8a89c"/>
  <rect x="150" y="220" width="14" height="47" rx="2" fill="#8faa98"/>
  <!-- Books row 2 -->
  <rect x="50" y="282" width="22" height="52" rx="2" fill="#c8a07a"/>
  <rect x="74" y="288" width="16" height="46" rx="2" fill="#8899b0"/>
  <rect x="92" y="283" width="18" height="51" rx="2" fill="#b4c4a8"/>
  <rect x="112" y="286" width="20" height="48" rx="2" fill="#9ab0c8"/>
  <rect x="134" y="282" width="16" height="52" rx="2" fill="#c4927a"/>
  <rect x="152" y="286" width="12" height="48" rx="2" fill="#a8a098"/>
  <!-- Small plant on shelf -->
  <rect x="56" y="353" width="28" height="22" rx="3" fill="url(#potGrad)" opacity="0.85"/>
  <ellipse cx="70" cy="353" rx="14" ry="10" fill="#6fa876"/>
  <ellipse cx="62" cy="348" rx="9" ry="7" fill="#82ba88"/>
  <ellipse cx="78" cy="347" rx="8" ry="7" fill="#6fa876"/>

  <!-- Floor lamp (right side) -->
  <!-- Base -->
  <ellipse cx="958" cy="458" rx="28" ry="8" fill="#b8b0a4"/>
  <!-- Pole -->
  <rect x="954" y="220" width="8" height="238" rx="4" fill="#c8c0b4"/>
  <!-- Shade -->
  <path d="M920 220 Q958 195 996 220 L982 260 Q958 240 934 260 Z" fill="#f5e8d0" opacity="0.95"/>
  <path d="M920 220 Q958 195 996 220" fill="none" stroke="#e0d4bc" stroke-width="2"/>

  <!-- Plant in corner (left) -->
  <rect x="175" y="405" width="40" height="55" rx="4" fill="url(#potGrad)"/>
  <rect x="178" y="403" width="34" height="10" rx="3" fill="#b86848"/>
  <!-- Leaves -->
  <ellipse cx="195" cy="395" rx="20" ry="30" fill="#5d9464" transform="rotate(-15,195,395)"/>
  <ellipse cx="200" cy="388" rx="18" ry="28" fill="#6faa76" transform="rotate(10,200,388)"/>
  <ellipse cx="188" cy="385" rx="16" ry="26" fill="#5d9464" transform="rotate(-25,188,385)"/>
  <ellipse cx="205" cy="393" rx="14" ry="22" fill="#7abc82" transform="rotate(30,205,393)"/>

  <!-- SOFA -->
  <!-- Sofa base -->
  <rect x="280" y="370" width="600" height="120" rx="14" fill="url(#sofaGrad)" filter="url(#softShadow)"/>
  <!-- Sofa back -->
  <rect x="280" y="310" width="600" height="80" rx="14" fill="#bdc8d2"/>
  <!-- Sofa arm left -->
  <rect x="266" y="340" width="40" height="150" rx="12" fill="#b0bdc8"/>
  <!-- Sofa arm right -->
  <rect x="854" y="340" width="40" height="150" rx="12" fill="#b0bdc8"/>
  <!-- Sofa cushions -->
  <rect x="295" y="375" width="178" height="100" rx="10" fill="#c5d0da" stroke="#b8c4ce" stroke-width="1.5"/>
  <rect x="491" y="375" width="178" height="100" rx="10" fill="#c5d0da" stroke="#b8c4ce" stroke-width="1.5"/>
  <rect x="687" y="375" width="148" height="100" rx="10" fill="#c5d0da" stroke="#b8c4ce" stroke-width="1.5"/>
  <!-- Cushion indent lines -->
  <line x1="384" y1="378" x2="384" y2="472" stroke="#b0bdc6" stroke-width="1.5" opacity="0.6"/>
  <line x1="580" y1="378" x2="580" y2="472" stroke="#b0bdc6" stroke-width="1.5" opacity="0.6"/>
  <line x1="761" y1="378" x2="761" y2="472" stroke="#b0bdc6" stroke-width="1.5" opacity="0.6"/>

  <!-- Throw pillow (decorative) -->
  <rect x="830" y="340" width="62" height="62" rx="10" fill="#e8d4c0" transform="rotate(-8,861,371)" filter="url(#subtleShadow)"/>
  <rect x="832" y="342" width="60" height="60" rx="9" fill="none" stroke="#d4c0aa" stroke-width="2" transform="rotate(-8,862,372)" opacity="0.6"/>

  <!-- PARENT (adult) - sitting right side, reading/watching -->
  <!-- Body/torso -->
  <rect x="730" y="295" width="90" height="130" rx="22" fill="#e8c4a0"/>
  <!-- Shirt -->
  <rect x="730" y="340" width="90" height="85" rx="16" fill="#8facc0"/>
  <!-- Neck -->
  <rect x="758" y="278" width="34" height="28" rx="10" fill="#e8c4a0"/>
  <!-- Head -->
  <ellipse cx="775" cy="265" rx="38" ry="42" fill="#e8c4a0" filter="url(#subtleShadow)"/>
  <!-- Hair (adult, short) -->
  <path d="M737 248 Q740 215 775 212 Q810 215 813 248 Q805 232 775 228 Q745 232 737 248Z" fill="#5c4030"/>
  <!-- Eye left -->
  <ellipse cx="762" cy="266" rx="5" ry="5.5" fill="#3a2e28"/>
  <ellipse cx="763" cy="265" rx="2" ry="2" fill="white" opacity="0.6"/>
  <!-- Eye right -->
  <ellipse cx="788" cy="266" rx="5" ry="5.5" fill="#3a2e28"/>
  <ellipse cx="789" cy="265" rx="2" ry="2" fill="white" opacity="0.6"/>
  <!-- Eyebrows -->
  <path d="M756 258 Q762 255 768 257" fill="none" stroke="#5c4030" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M782 258 Q788 255 794 257" fill="none" stroke="#5c4030" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Gentle smile -->
  <path d="M765 280 Q775 288 785 280" fill="none" stroke="#c4926a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arm reaching/resting near child -->
  <path d="M730 380 Q660 390 620 420" fill="none" stroke="#e8c4a0" stroke-width="28" stroke-linecap="round"/>
  <path d="M730 380 Q660 390 620 420" fill="none" stroke="#8facc0" stroke-width="20" stroke-linecap="round"/>
  <!-- Hand near child -->
  <ellipse cx="612" cy="425" rx="22" ry="16" fill="#e8c4a0"/>

  <!-- CHILD - sitting on sofa, using tablet -->
  <!-- Legs/lower body -->
  <rect x="430" y="400" width="70" height="70" rx="16" fill="#d4a878"/>
  <!-- Pants/leggings -->
  <rect x="428" y="430" width="74" height="55" rx="14" fill="#8090a8"/>
  <!-- Torso -->
  <rect x="420" y="300" width="90" height="120" rx="20" fill="#e8b888"/>
  <!-- Shirt (warm coral) -->
  <rect x="420" y="340" width="90" height="80" rx="16" fill="#e8806a"/>
  <!-- Neck -->
  <rect x="448" y="283" width="34" height="26" rx="10" fill="#e8b888"/>
  <!-- Head -->
  <ellipse cx="465" cy="268" rx="40" ry="44" fill="#e8b888" filter="url(#subtleShadow)"/>
  <!-- Hair (child, wavy) -->
  <path d="M425 252 Q428 208 465 204 Q502 208 505 252 Q495 228 465 224 Q435 228 425 252Z" fill="#3a2818"/>
  <!-- Hair detail waves -->
  <path d="M425 245 Q435 240 445 245" fill="none" stroke="#2e2014" stroke-width="2" opacity="0.5"/>
  <!-- Eyes (looking down at tablet) -->
  <ellipse cx="452" cy="272" rx="5" ry="4" fill="#2e2018"/>
  <ellipse cx="478" cy="272" rx="5" ry="4" fill="#2e2018"/>
  <!-- Slight smile -->
  <path d="M456 285 Q465 292 474 285" fill="none" stroke="#c8906a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- TABLET in child's hands -->
  <!-- Tablet body -->
  <rect x="410" y="355" width="120" height="90" rx="10" fill="#2a2e38" filter="url(#subtleShadow)"/>
  <!-- Screen -->
  <rect x="417" y="361" width="106" height="76" rx="7" fill="url(#screenGlow)"/>
  <!-- Screen content (abstract calm illustration, no text) -->
  <!-- Soft blue shapes suggesting content -->
  <ellipse cx="450" cy="390" rx="18" ry="14" fill="#a8d4f0" opacity="0.6"/>
  <ellipse cx="480" cy="385" rx="14" ry="10" fill="#c0e4f8" opacity="0.5"/>
  <ellipse cx="500" cy="395" rx="10" ry="8" fill="#b0d8f0" opacity="0.4"/>
  <!-- Gentle wavy lines suggesting peaceful content -->
  <path d="M422 410 Q445 404 468 410 Q491 416 514 410" fill="none" stroke="#8cc8e8" stroke-width="2" opacity="0.5"/>
  <path d="M422 420 Q445 414 468 420 Q491 426 514 420" fill="none" stroke="#8cc8e8" stroke-width="1.5" opacity="0.35"/>
  <!-- Home button -->
  <circle cx="470" cy="443" r="5" fill="#3a4050" stroke="#50586a" stroke-width="1.5"/>

  <!-- Child's arms holding tablet -->
  <path d="M420 370 Q395 385 392 400" fill="none" stroke="#e8b888" stroke-width="22" stroke-linecap="round"/>
  <path d="M510 370 Q535 385 538 400" fill="none" stroke="#e8b888" stroke-width="22" stroke-linecap="round"/>
  <!-- Hands -->
  <ellipse cx="390" cy="406" rx="18" ry="14" fill="#e8b888"/>
  <ellipse cx="540" cy="406" rx="18" ry="14" fill="#e8b888"/>

  <!-- Small side table -->
  <rect x="858" y="440" width="80" height="20" rx="4" fill="#d4c8b8"/>
  <rect x="876" y="420" width="44" height="22" rx="3" fill="#c8bca8"/>
  <!-- Cup on table -->
  <rect x="886" y="408" width="24" height="20" rx="4" fill="#e8ddd0"/>
  <ellipse cx="898" cy="408" rx="12" ry="4" fill="#f0e8e0"/>
  <!-- Steam wisps -->
  <path d="M892 404 Q894 398 892 392" fill="none" stroke="#d4c8b8" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M898 403 Q900 397 898 391" fill="none" stroke="#d4c8b8" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M904 404 Q906 398 904 392" fill="none" stroke="#d4c8b8" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- Soft window light from upper right -->
  <path d="M1060 0 L1200 0 L1200 300 L1060 0Z" fill="#fff8f0" opacity="0.18"/>
  <path d="M1100 0 L1200 0 L1200 200 L1100 0Z" fill="#fff8f0" opacity="0.12"/>

  <!-- Subtle connection arc between parent and child (soft glow) -->
  <path d="M612 420 Q580 380 530 390" fill="none" stroke="#8facc0" stroke-width="3" opacity="0.2" stroke-dasharray="6,6"/>

</svg>
