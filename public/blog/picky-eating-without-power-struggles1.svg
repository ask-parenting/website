  <!-- Mac base — smaller portion, slightly different presentation -->
  <ellipse cx="572" cy="335" rx="62" ry="22" fill="#F0C060" opacity="0.85"/>
  <!-- Fewer mac pieces, same food -->
  <path d="M 522 330 Q 529 323 539 328 Q 542 337 534 341 Q 524 337 522 330Z" fill="#F8C868"/>
  <path d="M 540 326 Q 548 319 558 324 Q 561 333 553 337 Q 543 333 540 326Z" fill="#EEB858"/>
  <path d="M 558 324 Q 566 317 576 322 Q 579 331 571 335 Q 561 331 558 324Z" fill="#F8C868"/>
  <path d="M 576 323 Q 584 316 594 321 Q 597 330 589 334 Q 579 330 576 323Z" fill="#EEB858"/>
  <path d="M 594 324 Q 602 317 612 322 Q 615 331 607 335 Q 597 331 594 324Z" fill="#F8C868"/>
  <path d="M 534 337 Q 542 330 552 335 Q 555 344 547 348 Q 537 344 534 337Z" fill="#E8B050"/>
  <path d="M 552 335 Q 560 328 570 333 Q 573 342 565 346 Q 555 342 552 335Z" fill="#F8C868"/>
  <path d="M 570 334 Q 578 327 588 332 Q 591 341 583 345 Q 573 341 570 334Z" fill="#E8B050"/>
  <path d="M 588 335 Q 596 328 606 333 Q 609 342 601 346 Q 591 342 588 335Z" fill="#F8C868"/>

  <!-- Peas scattered (new element) -->
  <circle cx="638" cy="326" r="7" fill="#88C060" filter="url(#itemShadow)"/>
  <circle cx="628" cy="336" r="7" fill="#7AB854"/>
  <circle cx="645" cy="339" r="7" fill="#88C060"/>
  <circle cx="635" cy="348" r="6.5" fill="#7AB854"/>
  <circle cx="650" cy="328" r="6" fill="#98CC70"/>
  <circle cx="655" cy="345" r="6" fill="#7AB854"/>
  <!-- Pea highlights -->
  <circle cx="636" cy="323" r="2.5" fill="#A8D880" opacity="0.5"/>
  <circle cx="645" cy="336" r="2" fill="#A8D880" opacity="0.5"/>

  <!-- Chicken pieces (mild, familiar shape) -->
  <g filter="url(#itemShadow)">
    <rect x="542" y="348" width="40" height="22" rx="8" fill="#F0D098"/>
    <rect x="545" y="350" width="34" height="18" rx="6" fill="#F8D8A0" opacity="0.6"/>
    <!-- Cooked texture suggestion -->
    <path d="M 548 356 Q 560 353 572 358" stroke="#E0B878" stroke-width="1.5" fill="none" opacity="0.5"/>
  </g>
  <g filter="url(#itemShadow)">
    <rect x="556" y="356" width="36" height="20" rx="7" fill="#EEC888" transform="rotate(-15, 574, 366)"/>
    <rect x="559" y="358" width="30" height="16" rx="5" fill="#F8D898" opacity="0.55" transform="rotate(-15, 574, 366)"/>
  </g>

  <!-- Plate 2 label dot — muted blue = familiar but slightly new -->
  <circle cx="598" cy="392" r="10" fill="#7898C8" opacity="0.55"/>
  <circle cx="598" cy="392" r="6" fill="#88A8D8" opacity="0.7"/>


  <!-- ===== PLATE 3 — EXPLORER / TINY PORTION (RIGHT) ===== -->
  <!-- Placemat 3 -->
  <ellipse cx="980" cy="370" rx="185" ry="56" fill="url(#mat3)" opacity="0.8"/>
  <ellipse cx="980" cy="368" rx="178" ry="50" fill="#D8C8BC" opacity="0.35"/>

  <!-- Plate 3 (smaller!) -->
  <ellipse cx="980" cy="358" rx="130" ry="38" fill="#00000012" filter="url(#softBlur)"/>
  <ellipse cx="978" cy="346" rx="128" ry="38" fill="url(#plate3)" filter="url(#plateShadow)"/>
  <ellipse cx="978" cy="344" rx="118" ry="34" fill="#FCFCF8"/>
  <ellipse cx="978" cy="343" rx="100" ry="28" fill="#F8F8F0"/>

  <!-- EXPLORER: tiny amounts of bolder/newer foods -->
  <!-- Small piece of roasted carrot -->
  <g filter="url(#itemShadow)">
    <rect x="920" y="328" width="46" height="16" rx="7" fill="#F08040" transform="rotate(12, 943, 336)"/>
    <rect x="923" y="330" width="40" height="12" rx="5" fill="#F89050" opacity="0.5" transform="rotate(12, 943, 336)"/>
    <!-- Roasted lines -->
    <path d="M 926 335 Q 940 331 954 336" stroke="#D86A28" stroke-width="1.5" fill="none" opacity="0.45" transform="rotate(12, 943, 336)"/>
  </g>

  <!-- Tiny portion of hummus / dip -->
  <ellipse cx="978" cy="342" rx="28" ry="18" fill="#E8D098" opacity="0.85"/>
  <ellipse cx="974" cy="340" rx="22" ry="13" fill="#F0D8A8" opacity="0.6"/>
  <!-- Hummus swirl suggestion -->
  <path d="M 966 342 Q 974 336 982 342 Q 974 348 966 342Z" fill="#D8C080" opacity="0.4"/>
  <!-- Olive oil drizzle -->
  <ellipse cx="980" cy="338" rx="6" ry="4" fill="#C8A840" opacity="0.35"/>

  <!-- Tiny broccoli floret (just 1) -->
  <rect x="1016" y="330" width="5" height="16" rx="2.5" fill="#6A9858"/>
  <circle cx="1018" cy="328" r="8" fill="#7AB868" filter="url(#itemShadow)"/>
  <circle cx="1013" cy="323" r="6" fill="#88C070"/>
  <circle cx="1023" cy="324" r="6" fill="#7AB868"/>
  <circle cx="1016" cy="320" r="4.5" fill="#96D080" opacity="0.8"/>
  <circle cx="1024" cy="320" r="4" fill="#96D080" opacity="0.7"/>

  <!-- Plate 3 label dot — warm amber = exploratory/curious -->
  <circle cx="978" cy="388" r="10" fill="#D4A040" opacity="0.55"/>
  <circle cx="978" cy="388" r="6" fill="#E4B050" opacity="0.7"/>


  <!-- Gentle connector dots between plates (visual flow, not text) -->
  <circle cx="415" cy="356" r="5" fill="#C8B898" opacity="0.5"/>
  <circle cx="435" cy="356" r="5" fill="#C8B898" opacity="0.4"/>
  <circle cx="455" cy="356" r="5" fill="#C8B898" opacity="0.3"/>

  <circle cx="795" cy="350" r="5" fill="#C8B898" opacity="0.5"/>
  <circle cx="815" cy="350" r="5" fill="#C8B898" opacity="0.4"/>
  <circle cx="835" cy="350" r="5" fill="#C8B898" opacity="0.3"/>


  <!-- Small cups beside each plate (not dominant) -->
  <!-- Cup 1 -->
  <rect x="86" y="338" width="40" height="54" rx="10" fill="#A8C4D8" filter="url(#itemShadow)"/>
  <rect x="89" y="341" width="34" height="46" rx="8" fill="#B8D4E8" opacity="0.5"/>
  <rect x="84" y="330" width="48" height="12" rx="5" fill="#90B0C8"/>
  <!-- Cup 2 -->
  <rect x="1090" y="336" width="40" height="54" rx="10" fill="#C8B0A8" filter="url(#itemShadow)"/>
  <rect x="1093" y="339" width="34" height="46" rx="8" fill="#D8C0B8" opacity="0.5"/>
  <rect x="1088" y="328" width="48" height="12" rx="5" fill="#B0988E"/>

  <!-- Soft table vignette -->
  <radialGradient id="vig" cx="50%" cy="55%" r="60%">
    <stop offset="40%" style="stop-color:transparent"/>
    <stop offset="100%" style="stop-color:#C4B098;stop-opacity:0.2"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#vig)"/>
</svg>
