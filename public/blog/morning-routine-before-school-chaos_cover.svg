<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7F4EF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EAF2F8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8DDD0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4C8B8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0EDE8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8E3DC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="windowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D6EAF8;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#FDEBD0;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#FDEBD0;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B9BD5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3A7FC1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bagFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6BAEE0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A8FCC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="adultBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8B89A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A085;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="childBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F2C98A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0B070;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sunRay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF3E3;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FDF3E3;stop-opacity:0" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="8" stdDeviation="8" flood-color="#00000015"/>
    </filter>
    <filter id="gentleShadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#00000012"/>
    </filter>
    <clipPath id="windowClip">
      <rect x="820" y="80" width="220" height="280" rx="8"/>
    </clipPath>
  </defs>

  <!-- Background wall -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="440" fill="url(#wallGrad)"/>

  <!-- Floor -->
  <rect y="440" width="1200" height="190" fill="url(#floorGrad)"/>
  <!-- Floor highlight -->
  <rect y="440" width="1200" height="4" fill="#D8CBB8" opacity="0.6"/>

  <!-- Baseboard -->
  <rect y="432" width="1200" height="12" fill="#D4C4B0" rx="2"/>

  <!-- Sun rays from window -->
  <polygon points="830,80 1040,80 850,440 640,440" fill="url(#sunRay)" opacity="0.35"/>

  <!-- Window frame -->
  <rect x="818" y="78" width="224" height="284" rx="10" fill="#D8D0C4" filter="url(#gentleShadow)"/>
  <rect x="822" y="82" width="216" height="276" rx="8" fill="url(#windowGrad)" clip-path="url(#windowClip)"/>
  <!-- Window panes -->
  <line x1="930" y1="82" x2="930" y2="358" stroke="#C8C0B4" stroke-width="4"/>
  <line x1="822" y1="220" x2="1038" y2="220" stroke="#C8C0B4" stroke-width="4"/>
  <!-- Window sill -->
  <rect x="812" y="356" width="236" height="16" rx="4" fill="#D0C8BC"/>
  <!-- Small plant on sill -->
  <ellipse cx="1000" cy="358" rx="16" ry="8" fill="#8FBC8F" opacity="0.8"/>
  <rect x="994" y="350" width="12" height="12" rx="2" fill="#A0785A"/>
  <ellipse cx="1000" cy="346" rx="10" ry="12" fill="#72A872" opacity="0.9"/>
  <ellipse cx="993" cy="352" rx="7" ry="9" fill="#5D9B6B" opacity="0.8"/>
  <ellipse cx="1007" cy="350" rx="7" ry="10" fill="#68A870" opacity="0.85"/>

  <!-- Clock on wall (no numbers) -->
  <circle cx="200" cy="120" r="48" fill="white" filter="url(#gentleShadow)"/>
  <circle cx="200" cy="120" r="44" fill="#FAFAF8" stroke="#E8E0D8" stroke-width="2"/>
  <circle cx="200" cy="120" r="4" fill="#8A7A6A"/>
  <!-- Clock hands -->
  <line x1="200" y1="120" x2="200" y2="86" stroke="#6A5A4A" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="200" y1="120" x2="226" y2="128" stroke="#6A5A4A" stroke-width="3" stroke-linecap="round"/>
  <!-- Clock tick marks only (no numbers) -->
  <circle cx="200" cy="80" r="2.5" fill="#C0B4A8"/>
  <circle cx="200" cy="160" r="2.5" fill="#C0B4A8"/>
  <circle cx="160" cy="120" r="2.5" fill="#C0B4A8"/>
  <circle cx="240" cy="120" r="2.5" fill="#C0B4A8"/>

  <!-- Table / kitchen counter -->
  <rect x="320" y="295" width="460" height="18" rx="6" fill="#D8CFC4" filter="url(#gentleShadow)"/>
  <rect x="320" y="313" width="460" height="130" rx="4" fill="#E4DAD0"/>
  <!-- Table legs -->
  <rect x="340" y="443" width="18" height="40" rx="3" fill="#C8BEB4"/>
  <rect x="744" y="443" width="18" height="40" rx="3" fill="#C8BEB4"/>

  <!-- Items on table: lunchbox, water bottle, folder -->
  <!-- Lunchbox -->
  <rect x="350" y="250" width="70" height="46" rx="8" fill="#E8A060" filter="url(#gentleShadow)"/>
  <rect x="350" y="250" width="70" height="16" rx="8" fill="#F0B070"/>
  <rect x="375" y="243" width="20" height="10" rx="4" fill="#D89050"/>
  <!-- Lunchbox clasp -->
  <rect x="380" y="263" width="10" height="6" rx="2" fill="#C8803E"/>

  <!-- Water bottle -->
  <rect x="444" y="238" width="28" height="58" rx="10" fill="#6BBAA8" filter="url(#gentleShadow)"/>
  <rect x="447" y="232" width="22" height="10" rx="5" fill="#5AA090"/>
  <rect x="453" y="228" width="10" height="8" rx="3" fill="#4A8880"/>
  <!-- Water level indicator -->
  <rect x="447" y="258" width="18" height="28" rx="6" fill="#8DCAB8" opacity="0.5"/>

  <!-- Folder/workbook -->
  <rect x="494" y="248" width="56" height="48" rx="4" fill="#E88080" filter="url(#gentleShadow)"/>
  <rect x="494" y="248" width="56" height="6" rx="4" fill="#F09090"/>
  <rect x="500" y="260" width="44" height="3" rx="1.5" fill="#D07070" opacity="0.5"/>
  <rect x="500" y="268" width="36" height="3" rx="1.5" fill="#D07070" opacity="0.5"/>
  <rect x="500" y="276" width="40" height="3" rx="1.5" fill="#D07070" opacity="0.5"/>

  <!-- ADULT FIGURE (parent, standing, slightly bent toward child) -->
  <!-- Adult shadow -->
  <ellipse cx="480" cy="568" rx="42" ry="10" fill="#00000010"/>
  <!-- Adult legs -->
  <rect x="452" y="468" width="22" height="100" rx="10" fill="#6A7FA8"/>
  <rect x="480" y="468" width="22" height="100" rx="10" fill="#6A7FA8"/>
  <!-- Adult shoes -->
  <ellipse cx="463" cy="568" rx="16" ry="7" fill="#3A3A3A"/>
  <ellipse cx="491" cy="568" rx="16" ry="7" fill="#3A3A3A"/>
  <!-- Adult torso (slight forward lean) -->
  <rect x="440" y="340" width="68" height="132" rx="22" fill="#C4785A" filter="url(#gentleShadow)"/>
  <!-- Adult shirt detail -->
  <rect x="455" y="355" width="38" height="4" rx="2" fill="#B06848" opacity="0.4"/>
  <!-- Adult arms - one reaching toward bag -->
  <rect x="400" y="355" width="44" height="20" rx="10" fill="#D4906A" transform="rotate(-15, 422, 365)"/>
  <rect x="360" y="348" width="44" height="20" rx="10" fill="#D4906A" transform="rotate(-10, 382, 358)"/>
  <!-- Adult hand near bag area -->
  <ellipse cx="355" cy="352" rx="14" ry="12" fill="#D4906A"/>
  <!-- Other arm, resting on child shoulder-ish -->
  <rect x="504" y="360" width="40" height="18" rx="9" fill="#D4906A" transform="rotate(12, 524, 369)"/>
  <!-- Adult neck -->
  <rect x="462" y="316" width="30" height="28" rx="14" fill="#D4906A"/>
  <!-- Adult head -->
  <circle cx="477" cy="298" r="36" fill="#D4906A" filter="url(#gentleShadow)"/>
  <!-- Adult face - calm, looking down -->
  <ellipse cx="470" cy="305" rx="4" ry="5" fill="#B07858" opacity="0.8"/>
  <ellipse cx="486" cy="305" rx="4" ry="5" fill="#B07858" opacity="0.8"/>
  <!-- Smile -->
  <path d="M 468 316 Q 477 324 487 316" stroke="#B07858" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Adult hair -->
  <ellipse cx="477" cy="272" rx="36" ry="20" fill="#5A3E28"/>
  <ellipse cx="477" cy="268" rx="30" ry="18" fill="#6A4E38"/>
  <ellipse cx="453" cy="276" rx="14" ry="18" fill="#5A3E28"/>
  <ellipse cx="501" cy="276" rx="14" ry="18" fill="#5A3E28"/>

  <!-- CHILD FIGURE -->
  <!-- Child shadow -->
  <ellipse cx="620" cy="568" rx="32" ry="8" fill="#00000010"/>
  <!-- Child legs -->
  <rect x="597" y="468" width="18" height="98" rx="9" fill="#D4A84A"/>
  <rect x="621" y="468" width="18" height="98" rx="9" fill="#D4A84A"/>
  <!-- Child shoes small -->
  <ellipse cx="606" cy="566" rx="14" ry="6" fill="#3A3A3A"/>
  <ellipse cx="630" cy="566" rx="14" ry="6" fill="#3A3A3A"/>
  <!-- Child torso -->
  <rect x="586" y="365" width="64" height="108" rx="20" fill="#88C0A0" filter="url(#gentleShadow)"/>
  <!-- Shirt stripe detail -->
  <rect x="598" y="390" width="40" height="4" rx="2" fill="#68A882" opacity="0.5"/>
  <rect x="598" y="400" width="40" height="4" rx="2" fill="#68A882" opacity="0.5"/>
  <!-- Child arms reaching to bag -->
  <rect x="550" y="375" width="40" height="17" rx="8.5" fill="#E8C08A" transform="rotate(-20, 570, 383)"/>
  <ellipse cx="545" cy="370" rx="12" ry="11" fill="#E8C08A"/>
  <rect x="646" y="375" width="38" height="17" rx="8.5" fill="#E8C08A" transform="rotate(15, 665, 383)"/>
  <!-- Child neck -->
  <rect x="600" y="345" width="26" height="24" rx="12" fill="#E8C08A"/>
  <!-- Child head -->
  <circle cx="613" cy="326" r="30" fill="#E8C08A" filter="url(#gentleShadow)"/>
  <!-- Child eyes - looking at bag, wide and attentive -->
  <ellipse cx="605" cy="330" rx="4" ry="4.5" fill="#5A3828"/>
  <ellipse cx="621" cy="330" rx="4" ry="4.5" fill="#5A3828"/>
  <circle cx="606" cy="329" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="622" cy="329" r="1.5" fill="white" opacity="0.6"/>
  <!-- Child smile - happy -->
  <path d="M 604 340 Q 613 348 622 340" stroke="#C09070" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Child hair - tousled morning hair -->
  <ellipse cx="613" cy="303" rx="30" ry="16" fill="#4A3020"/>
  <ellipse cx="591" cy="312" rx="12" ry="16" fill="#4A3020"/>
  <ellipse cx="635" cy="312" rx="12" ry="16" fill="#4A3020"/>
  <ellipse cx="598" cy="298" rx="10" ry="8" fill="#5A4030"/>
  <ellipse cx="626" cy="299" rx="9" ry="7" fill="#5A4030"/>
  <!-- Child hair tuft -->
  <ellipse cx="614" cy="297" rx="8" ry="10" fill="#4A3020" transform="rotate(-10, 614, 297)"/>

  <!-- BACKPACK (on table, being packed) -->
  <g filter="url(#softShadow)">
    <!-- Bag body -->
    <rect x="148" y="268" width="140" height="170" rx="18" fill="url(#bagGrad)"/>
    <!-- Bag top curve -->
    <ellipse cx="218" cy="268" rx="70" ry="24" fill="#6BAEE0"/>
    <!-- Bag front pocket -->
    <rect x="162" y="340" width="112" height="72" rx="12" fill="url(#bagFront)"/>
    <!-- Pocket zipper line -->
    <path d="M 170 358 Q 218 348 266 358" stroke="#4A7FB8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Zipper pull -->
    <circle cx="218" cy="354" r="5" fill="#A8D0F0"/>
    <!-- Side details / compression straps -->
    <rect x="152" y="300" width="8" height="60" rx="4" fill="#4A8FCC" opacity="0.6"/>
    <rect x="276" y="300" width="8" height="60" rx="4" fill="#4A8FCC" opacity="0.6"/>
    <!-- Shoulder strap hint -->
    <path d="M 168 268 Q 148 240 158 210" stroke="#3A7FBC" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M 268 268 Q 288 240 278 210" stroke="#3A7FBC" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- Bag open top, items visible -->
    <ellipse cx="218" cy="248" rx="60" ry="18" fill="#5898CC" opacity="0.8"/>
    <!-- Items peeking out of bag -->
    <!-- Book spine -->
    <rect x="184" y="228" width="16" height="40" rx="3" fill="#E88880"/>
    <rect x="204" y="232" width="12" height="36" rx="3" fill="#F0D870"/>
    <rect x="220" y="230" width="14" height="38" rx="3" fill="#88C8A0"/>
    <!-- Pencil case top -->
    <rect x="238" y="236" width="26" height="32" rx="6" fill="#E8B880"/>
  </g>

  <!-- Decorative checkmark/star accent -->
  <circle cx="96" cy="380" r="22" fill="#A8D8B0" opacity="0.35"/>
  <path d="M 86 380 L 93 388 L 108 372" stroke="#5A9860" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>

  <!-- Small decorative element - morning star / sunburst top right -->
  <g transform="translate(1120, 70)" opacity="0.25">
    <circle cx="0" cy="0" r="18" fill="#F0C840"/>
    <line x1="0" y1="-28" x2="0" y2="-22" stroke="#F0C840" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="22" x2="0" y2="28" stroke="#F0C840" stroke-width="3" stroke-linecap="round"/>
    <line x1="-28" y1="0" x2="-22" y2="0" stroke="#F0C840" stroke-width="3" stroke-linecap="round"/>
    <line x1="22" y1="0" x2="28" y2="0" stroke="#F0C840" stroke-width="3" stroke-linecap="round"/>
    <line x1="-20" y1="-20" x2="-16" y2="-16" stroke="#F0C840" stroke-width="3" stroke-linecap="round"/>
    <line x1="16" y1="-16" x2="20" y2="-20" stroke="#F0C840" stroke-width="3" stroke-linecap="round"/>
    <line x1="-20" y1="20" x2="-16" y2="16" stroke="#F0C840" stroke-width="3" stroke-linecap="round"/>
    <line x1="16" y1="16" x2="20" y2="20" stroke="#F0C840" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Soft vignette overlay -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" style="stop-color:transparent"/>
    <stop offset="100%" style="stop-color:#D4C8B8;stop-opacity:0.18"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#vignette)"/>
</svg>
