<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F3EC;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F0E8DC;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="tableTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#CEBA9A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B0A080;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="plate1" cx="42%" cy="38%" r="58%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#EEE8E0;stop-opacity:1"/>
    </radialGradient>
    <radialGradient id="plate2" cx="42%" cy="38%" r="58%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#EEE8E0;stop-opacity:1"/>
    </radialGradient>
    <radialGradient id="plate3" cx="42%" cy="38%" r="58%">
      <stop offset="0%" style="stop-color:#FFFFF8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#EAE8DC;stop-opacity:1"/>
    </radialGradient>
    <linearGradient id="mat1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E0D0BE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D0C0A8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="mat2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D8E4D8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C8D4C0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="mat3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E4D8D0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D4C8BC;stop-opacity:1"/>
    </linearGradient>
    <filter id="plateShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#00000016"/>
    </filter>
    <filter id="itemShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000012"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Soft overhead light glow -->
  <ellipse cx="600" cy="0" rx="500" ry="280" fill="#FDF8F0" opacity="0.45"/>

  <!-- TABLE -->
  <rect y="310" width="1200" height="320" fill="url(#tableTop)"/>
  <rect y="308" width="1200" height="6" fill="#D8C8A8" opacity="0.7"/>
  <!-- Wood grain -->
  <line x1="0" y1="360" x2="1200" y2="360" stroke="#BAA882" stroke-width="1.5" opacity="0.25"/>
  <line x1="0" y1="410" x2="1200" y2="410" stroke="#BAA882" stroke-width="1.5" opacity="0.2"/>
  <line x1="0" y1="460" x2="1200" y2="460" stroke="#BAA882" stroke-width="1" opacity="0.15"/>
  <line x1="200" y1="310" x2="185" y2="630" stroke="#BAA882" stroke-width="1" opacity="0.12"/>
  <line x1="600" y1="310" x2="585" y2="630" stroke="#BAA882" stroke-width="1" opacity="0.12"/>
  <line x1="1000" y1="310" x2="985" y2="630" stroke="#BAA882" stroke-width="1" opacity="0.12"/>

