<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 105" width="100" height="105">
  <defs>
    <linearGradient id="stemGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#2D8B6F"/>
      <stop offset="100%" style="stop-color:#5EC49A"/>
    </linearGradient>
    <linearGradient id="leafL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6DCFA8"/>
      <stop offset="100%" style="stop-color:#3DAD85"/>
    </linearGradient>
    <linearGradient id="leafR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#89DDB8"/>
      <stop offset="100%" style="stop-color:#4DC494"/>
    </linearGradient>
    <linearGradient id="handGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E6D8"/>
      <stop offset="100%" style="stop-color:#EDD5C0"/>
    </linearGradient>
    <linearGradient id="bubbleFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
  </defs>

  <!--
    WhatsApp bubble: 
    - Circle body
    - Tail at bottom-left with concave (inward-curving) outer edge
      exactly like WhatsApp icon
  -->
  <g>
    <path d="
      M50 4
      C25.2 4 5 22.8 5 46
      C5 57.8 10.2 68.4 18.6 75.8
      L14 97
      L36.2 87.4
      C40.6 88.6 45.2 89.2 50 89.2
      C74.8 89.2 95 70.4 95 47.2
      C95 24 74.8 4 50 4
      Z
    " fill="url(#bubbleFill)" stroke="rgb(48,111,220)" stroke-width="6" stroke-linejoin="round"/>
  </g>

  <!-- Cupped hand -->
  <path d="M22 62 Q27 52 35 50 Q41 49 50 50 Q59 49 64 52 Q71 55 75 62"
        stroke="url(#handGrad)" stroke-width="4.8" stroke-linecap="round" fill="none"/>
  <path d="M26 63 Q35 56 50 55 Q65 56 72 63 Q61 68 50 68 Q35 68 26 63Z"
        fill="url(#handGrad)" opacity="0.65"/>

  <!-- Stem -->
  <line x1="50" y1="55" x2="50" y2="28" stroke="url(#stemGrad)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left leaf -->
  <path d="M50 43 C50 43 35 39 33 28 C33 28 46 26 50 43Z" fill="url(#leafL)"/>

  <!-- Right leaf -->
  <path d="M50 36 C50 36 65 32 67 21 C67 21 54 19 50 36Z" fill="url(#leafR)"/>

  <!-- Top bud -->
  <circle cx="50" cy="25" r="3" fill="#5EC49A" opacity="0.95"/>
  <circle cx="50" cy="25" r="1.5" fill="#B8EDD5"/>



</svg>