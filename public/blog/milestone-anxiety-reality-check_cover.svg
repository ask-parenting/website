    <stop offset="100%" stop-color="#B8A888"/>
  </linearGradient>
  <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#C8BCA8"/>
    <stop offset="100%" stop-color="#B0A490"/>
  </linearGradient>
  <linearGradient id="curveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#A8C4D0" stop-opacity="0.3"/>
    <stop offset="50%" stop-color="#7AAABF" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#5A90A8" stop-opacity="0.25"/>
  </linearGradient>
</defs>
