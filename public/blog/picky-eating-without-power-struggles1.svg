  <ellipse cx="220" cy="368" rx="182" ry="52" fill="#DDD0BC" opacity="0.4"/>

  <!-- Plate shadow -->
  <ellipse cx="220" cy="368" rx="148" ry="46" fill="#00000015" filter="url(#softBlur)"/>
  <!-- Plate 1 -->
  <ellipse cx="218" cy="355" rx="146" ry="44" fill="url(#plate1)" filter="url(#plateShadow)"/>
  <ellipse cx="218" cy="353" rx="136" ry="40" fill="#FCFAF8"/>
  <ellipse cx="218" cy="352" rx="118" ry="34" fill="#F8F6F0"/>

