  <ellipse cx="600" cy="360" rx="200" ry="60" fill="url(#mat2)" opacity="0.8"/>
  <ellipse cx="600" cy="358" rx="192" ry="54" fill="#D0DCD0" opacity="0.35"/>

  <!-- Plate shadow -->
  <ellipse cx="600" cy="358" rx="155" ry="48" fill="#00000015" filter="url(#softBlur)"/>
  <!-- Plate 2 -->
  <ellipse cx="598" cy="344" rx="152" ry="46" fill="url(#plate2)" filter="url(#plateShadow)"/>
  <ellipse cx="598" cy="342" rx="142" ry="42" fill="#FCFAF8"/>
  <ellipse cx="598" cy="341" rx="124" ry="36" fill="#F8F6F0"/>

